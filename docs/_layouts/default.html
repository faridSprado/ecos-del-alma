<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Raleway', sans-serif;
      background-color: #fbf9f6;
      color: #3e3640;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .main-header {
      width: 100%;
      padding: 4rem 2rem 2rem;
      text-align: center;
      background: linear-gradient(180deg, #f7f3ed 0%, #fbf9f6 100%);
      border-bottom: 1px solid #e7dfd4;
    }

    .main-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      font-weight: 400;
      color: #5d4e3e;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: #c9b99a;
      margin: 0.8rem auto 1.5rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #8b7b6b;
      font-weight: 300;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .posts-wrapper {
      width: 100%;
      max-width: 720px;
      margin: 2rem auto 3rem;
      padding: 0 1.5rem;
      flex: 1;
    }

    .post-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.03);
      border: 1px solid #efe8de;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.05);
    }

    .post-card .post-date {
      font-size: 0.8rem;
      color: #b8a88a;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .post-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: #4a3c31;
      margin: 0.4rem 0 0.6rem;
      line-height: 1.3;
    }

    .post-card .post-excerpt {
      color: #6b5e4f;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .post-card img {
      width: 100%;
      border-radius: 12px;
      margin-top: 1rem;
      border: 1px solid #f0e9dd;
    }

    .read-link {
      display: inline-block;
      margin-top: 0.8rem;
      color: #b8a88a;
      font-size: 0.9rem;
      border-bottom: 1px solid #d9cdb8;
      text-decoration: none;
      transition: color 0.2s;
    }

    .read-link:hover {
      color: #8b7b6b;
    }

    .main-footer {
      width: 100%;
      text-align: center;
      padding: 2.5rem 1rem;
      background: #f7f3ed;
      border-top: 1px solid #e7dfd4;
      color: #8b7b6b;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .agents {
      font-style: italic;
      color: #b8a88a;
    }

    @media (max-width: 600px) {
      .main-header h1 { font-size: 2.4rem; }
      .post-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <header class="main-header">
    <h1>{{ site.title }}</h1>
    <div class="divider"></div>
    <p class="subtitle">{{ site.description }}</p>
  </header>

  <main class="posts-wrapper">
    {{ content }}
  </main>

  <footer class="main-footer">
    <p class="agents">🖋️ El Poeta · 🛡️ El Guardián de la Emoción · 🎨 El Visualizador</p>
    <p>Generado con inteligencia artificial · Actualizado diariamente</p>
  </footer>
</body>
</html>
