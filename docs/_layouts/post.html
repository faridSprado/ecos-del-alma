<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Raleway', sans-serif;
      background: #fbf9f6;
      color: #3e3640;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .post-container {
      max-width: 680px;
      width: 90%;
      margin: 3rem auto;
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.03);
      border: 1px solid #efe8de;
    }
    .post-date {
      color: #b8a88a;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .post-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #5d4e3e;
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }
    .post-content {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      line-height: 2;
      color: #4a3c31;
      white-space: pre-line;
    }
    .post-content img {
      max-width: 100%;
      border-radius: 12px;
      margin: 2rem 0 1rem;
      border: 1px solid #f0e9dd;
    }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #b8a88a;
      font-size: 0.9rem;
      border-bottom: 1px solid #d9cdb8;
      text-decoration: none;
    }
    .footer {
      width: 100%;
      text-align: center;
      padding: 2rem;
      background: #f7f3ed;
      border-top: 1px solid #e7dfd4;
      color: #8b7b6b;
      font-size: 0.85rem;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="post-container">
    <div class="post-date">{{ page.date | date: "%d · %m · %Y" }}</div>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-content">
      {{ content }}
    </div>
    <a href="{{ site.baseurl }}/" class="back-link">← Volver al inicio</a>
  </div>
  <footer class="footer">
    <p>🖋️ El Poeta · 🛡️ El Guardián de la Emoción · 🎨 El Visualizador</p>
  </footer>
</body>
</html>
