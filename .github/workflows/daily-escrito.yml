name: Generar y publicar Ecos del Alma

on:
  schedule:
    # 08:00 UTC = 3:00 a. m. Colombia
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar nuevo escrito
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          PROJECT_TIMEZONE: America/Bogota
        run: python main.py

      - name: Guardar publicación generada
        run: |
          git config --global user.name "Ecos del Alma Bot"
          git config --global user.email "bot@ecosdelalma.local"
          git add docs/_posts/ docs/assets/social/ memoria/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Nuevo escrito generado" && git push)
