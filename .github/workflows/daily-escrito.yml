name: Generar y Publicar Ecos del Alma

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍 Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Instalar dependencias
        run: pip install groq==0.15.0 python-dotenv==1.0.1 requests==2.32.3

      - name: 🖋️ Ejecutar generación
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: 📤 Subir cambios
        run: |
          git config --global user.name 'El Poeta Bot'
          git config --global user.email 'poeta@ecosdelalma.arte'
          git add web/_posts/ memoria/
          git diff --quiet && git diff --staged --quiet || (git commit -m "✨ Nuevo escrito generado [skip ci]" && git push)